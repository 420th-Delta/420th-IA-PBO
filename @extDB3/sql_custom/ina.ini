;; See below reference for writing new queries:
;; https://github.com/SteezCram/extDB3/wiki/extDB3---sql_custom.ini
[Default]
Version = 1
Strip Chars = ";[]"
Strip Chars Mode = 0
Input SQF Parser = false
Number of Retrys = 5

[getProtocolVersion]
SQL1_1 = SELECT 1.0;
OUTPUT = 1

[getWhitelists]
SQL1_1 = SELECT steam_id, role_s3, role_cas, role_s1, role_opfor, role_all, role_admin, role_moderator, role_trusted, role_media, role_curator, role_developer FROM users;
OUTPUT = 1-string, 2-bool, 3-bool, 4-bool, 5-bool, 6-bool, 7-bool, 8-bool, 9-bool, 10-bool, 11-bool, 12-bool
